name: CodeQL

# Advanced setup. This replaces code scanning "Default setup", which must be
# disabled in repository settings before this workflow can upload results.
#
# Deliberately no `paths` filter on the triggers: a skipped run is not a passing
# run, so filtering here would leave pull requests without a baseline to compare
# against and reintroduce the "configurations not found" warning.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, so new queries reach unchanged code. Off-peak, off the hour.
    - cron: "27 4 * * 1"
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      security-events: write
      contents: read
      actions: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          # Must stay "/language:<lang>" so these analyses inherit the identity
          # of the configurations default setup already recorded on main.
          category: "/language:${{ matrix.language }}"
