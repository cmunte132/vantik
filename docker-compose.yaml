version: "3"

services:
  webapp:
    container_name: webapp
    build:
      context: .
      dockerfile: ./apps/webapp/Dockerfile
    image: vantikhq/vantik-webapp:0.3.11-alpha
    restart: always
    ports:
      - 3000:3000
    networks:
      - vantik

  server:
    container_name: server
    build:
      context: .
      dockerfile: ./apps/server/Dockerfile
    image: vantikhq/vantik-server:0.3.11-alpha
    restart: always
    ports:
      - 3001:3001
    networks:
      - vantik

# Define a network, which allows containers to communicate
# with each other, by using their container name as a hostname
networks:
  vantik:
    external: true
